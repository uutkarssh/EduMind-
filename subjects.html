    </div>

  </div>

<script src="js/app.js"></script>
<script>
if (!EduMind.requireAuth()) {/* redirected */} else {
  EduMind.populateDashNav();
  EduMind.initMobileNav();

  const profile = EduMind.Storage.getProfile();
  const cls     = parseInt(profile.studentClass);

  document.getElementById('subjects-title').textContent = `Class ${cls} Subjects`;
  document.getElementById('subjects-sub').textContent   = `${profile.stream ? profile.stream + ' Stream · ' : ''}Click any subject to study or ask doubts`;

  const SUBJECT_DATA = [
    { name: 'Mathematics',    emoji: '📐', desc: 'Algebra, geometry, calculus, and more. Step-by-step solutions for every problem.', bg: 'linear-gradient(135deg,#1e1b4b,#3730a3,#4f46e5)', classes: [6,7,8,9,10,11,12], streams: ['Science','Commerce','Arts',null] },
    { name: 'Physics',        emoji: '⚡', desc: 'Mechanics, electricity, optics, and waves. Perfect for JEE/NEET preparation.',   bg: 'linear-gradient(135deg,#0c1445,#1e3a8a,#2563eb)', classes: [9,10,11,12],     streams: ['Science',null] },
    { name: 'Chemistry',      emoji: '🧪', desc: 'Organic, inorganic, and physical chemistry with NCERT-level explanations.',       bg: 'linear-gradient(135deg,#064e3b,#065f46,#10b981)', classes: [9,10,11,12],     streams: ['Science',null] },
    { name: 'Biology',        emoji: '🧬', desc: 'Cell biology, genetics, ecology, and human physiology for NEET aspirants.',       bg: 'linear-gradient(135deg,#14532d,#166534,#16a34a)', classes: [9,10,11,12],     streams: ['Science',null] },
    { name: 'English',        emoji: '📖', desc: 'Grammar, writing skills, comprehension, and literature analysis.',                bg: 'linear-gradient(135deg,#450a0a,#991b1b,#dc2626)', classes: [6,7,8,9,10,11,12],streams: ['Science','Commerce','Arts',null] },
    { name: 'Social Science', emoji: '🌍', desc: 'History, Geography, Civics, and Economics — board-exam focused.',                  bg: 'linear-gradient(135deg,#0a1a2e,#1a3a6e,#2e5a8e)', classes: [6,7,8,9,10],     streams: [null] },
    { name: 'Economics',      emoji: '📊', desc: 'Micro and macroeconomics with India-specific examples. Perfect for Commerce.',    bg: 'linear-gradient(135deg,#431407,#9a3412,#ea580c)', classes: [11,12],            streams: ['Commerce','Arts',null] },
    { name: 'Accountancy',    emoji: '💼', desc: 'Journal entries, balance sheets, and financial statements made simple.',          bg: 'linear-gradient(135deg,#1e1b4b,#6d28d9,#8b5cf6)', classes: [11,12],            streams: ['Commerce',null] },
  ];

  const grid = document.getElementById('subjects-grid');
  SUBJECT_DATA.forEach(sub => {
    const visible = sub.classes.includes(cls) &&
      (cls <= 10 || sub.streams.includes(null) || sub.streams.includes(profile.stream));
    if (!visible) return;
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.innerHTML = `
      <div class="subject-card-img" style="background:${sub.bg}">
        <div style="font-size:32px">${sub.emoji}</div>
        <div class="subject-card-img-title">${sub.name}</div>
      </div>
      <div class="subject-card-body">
        <div class="subject-card-name">${sub.name}</div>
        <div class="subject-card-desc">${sub.desc}</div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn-primary btn-sm" onclick="event.stopPropagation();studySubject('${sub.name}')">📚 Study</button>
          <button class="btn-secondary btn-sm" onclick="event.stopPropagation();askDoubt('${sub.name}')">💬 Ask</button>
        </div>
      </div>`;
    card.addEventListener('click', () => studySubject(sub.name));
    grid.appendChild(card);
  });

  // FIXED: pass subject name via URL query parameter
  function studySubject(name) {
    window.location.href = `study.html?subject=${encodeURIComponent(name)}`;
  }
  function askDoubt(name) {
    window.location.href = `chat.html`;
    // Store pre-fill intent for chat page
    sessionStorage.setItem('edumind_chat_prefill', `I have a question about ${name}.`);
  }
}
</script>
</body>
</html>
